<!DOCTYPE html>
<html
  lang="en"
  data-bs-theme="{{ theme }}"
  class="sl-theme-{{ theme }} {{ color }}-primary"
>
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="NB Bracket Challenge. A site to create brackets for college hockey playoffs."
    />

    <link rel="manifest" href="/static/manifest.webmanifest" />

    <!-- Shoelace components -->
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.12.0/cdn/shoelace.js"
    ></script>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />

    <link href="/static/css/output.css" rel="stylesheet" />
    <link href="/static/css/light.css" rel="stylesheet" />
    <link href="/static/css/dark.css" rel="stylesheet" />
    <link href="/static/css/themes.css" rel="stylesheet" />

    <link
      rel="stylesheet"
      href="/static/css/bundle.min.css"
      render="blocking"
      fetchpriority="high"
    />
    <link
      id="theme"
      rel="stylesheet"
      href=""
      render="blocking"
      fetchpriority="high"
    />
    <link
      id="palette"
      rel="stylesheet"
      href=""
      render="blocking"
      fetchpriority="high"
    />

    <link
      rel="icon"
      href="{% block icon %}/static/images/logo.svg{% endblock icon %}"
    />
    <title>{% block title %}{% endblock title %}</title>
    <script src="/static/js/nb-countdown.mjs" type="module"></script>

    <script>
        // URL for updating user settings
        const UPDATE_USER_SETTINGS =
          "{{ url_for('user_settings_bp.update_settings') }}"

        // URLs for user auth and user edits
        const LOGIN_URL = "{{ url_for('auth_bp.login') }}";
        const SIGNUP_URL = "{{ url_for('auth_bp.signup') }}";
        const PASSWORD_RESET_REQUEST_URL =
          "{{ url_for('auth_bp.password_request') }}";
        const USERNAME_UNIQUE_URL = "{{ url_for('auth_bp.username_unique') }}";
        const EMAIL_UNIQUE_URL = "{{ url_for('auth_bp.email_unique') }}";

        {% if current_user.is_authenticated %}
          const CURRENT_USER = {{ current_user.to_dict()|tojson }};
        {% else %}
          const CURRENT_USER = {};
        {% endif %}

        const [month, day, year] = new Date()
        .toLocaleDateString(undefined, {
          year: "numeric",
          day: "2-digit",
          month: "2-digit",
        })
        .split("/");

      const CURRENT_DATE = `${year}-${month}-${day}`;
      const CAN_EDIT_BRACKET = "{{ CAN_EDIT_BRACKET }}" == "True";
      const MY_BRACKET_COUNT = {{ MY_BRACKET_COUNT }};
      const CURRENT_YEAR = {{ CURRENT_YEAR }};
    </script>

    <script type="module">
      import {
        Theme,
        THEME_LIST,
        COLOR_PALETTE_LIST,
      } from "/static/js/theme.mjs";
      window.THEME = new Theme({{ user_settings.settings|tojson }});

      let storedTheme = window.localStorage.getItem("theme");
      if (storedTheme === "dark" || storedTheme === "light") {
        window.THEME.migrateTheme(storedTheme);
      }
      console.log(window.THEME);
    </script>
    <script src="/static/js/nb-back-button.mjs" type="module"></script>
    <script src="/static/js/nb-alert.mjs" type="module"></script>
    <script src="/static/js/nb-theme-selector.mjs" type="module"></script>
    <script src="/static/js/main.bundle.mjs" type="module"></script>
    <script src="/static/js/nb-combobox.mjs" type="module"></script>

    {% block head %}{% endblock head %}

    <script
      src="https://js.sentry-cdn.com/85a281a7156d9e667f62a479c3277fce.min.js"
      crossorigin="anonymous"
      defer
    >
      if (window.Sentry) {
        Sentry.onLoad(function () {
          Sentry.init({
            release: "nbbracketchallengefront@1.0.13",
            environment: "production",
            integrations: [
              Sentry.browserTracingIntegration(),
            ],
            tracesSampleRate: 1.0,
            sendDefaultPii: true,
          });
        });
      }
    </script>
  </head>

  <style>
    @font-face {
      font-family: Inter;
      src: url("/static/fonts/Inter-VariableFont_slnt,wght.ttf");
    }
  </style>

  <body
    class="{% if not backgroundColorMatches %}{{ backgroundColor }}-background{% endif %}"
    {%
    if
    backgroundColorMatches
    %}style="background-color: {{ backgroundColor }}"
    {%
    endif
    %}
  >
    {% include "navbar.html" %}

    <div class="container my-4 h-100">
      {% with messages = get_flashed_messages(with_categories=true) %}
      <div id="alerts" class="container d-flex justify-content-center">
        {% if messages %} {% for category, message in messages %}
        <sl-alert variant="{{ category }}" duration="5000" open closable>
          {{ message }}
        </sl-alert>
        {% endfor %} {% endif %}
      </div>
      {% endwith %} {% block content %}{% endblock content %}
    </div>

    <!-- Optional JavaScript -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
